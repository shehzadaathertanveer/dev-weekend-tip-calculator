<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
</head>
<body>

    <main class="main-container">
        
        <section class="left-side">
            
            <div class="input-group">
                <label>Enter bill Amount</label>
                <input type="number" id="bill-input" placeholder="0.00" oninput="calculate()">
            </div>

            <div class="input-group">
                <label>Please select Tip %</label>
                <div class="tip-buttons">
                    <button type="button" onclick="clickBtn(10)">10%</button>
                    <button type="button" onclick="clickBtn(15)">15%</button>
                    <button type="button" onclick="clickBtn(20)">20%</button>
                </div>
                <input type="number" id="custom-tip-input" placeholder="Custom %" oninput="typeCustom()">
            </div>

            <div class="input-group">
                <div class="label-row">
                    <label>Number of People</label>
                    <span id="error-message"></span>
                </div>
                <input type="number" id="people-input" placeholder="1" oninput="calculate()">
            </div>

        </section>

        <section class="right-side">
            
            <div class="display-row">
                <h3>Tip Amount <br><span>/ person</span></h3>
                <div class="result">$<span id="tip-per-person">0.00</span></div>
            </div>

            <div class="display-row">
                <h3>Total Due <br><span>/ person</span></h3>
                <div class="result">$<span id="total-per-person">0.00</span></div>
            </div>

            <button id="reset-btn" onclick="resetAll()">RESET</button>

        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
